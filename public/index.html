<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1D9E75" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Pushups" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
    <title>Morning Pushups</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div class="update-banner" id="update-banner" onclick="
      navigator.serviceWorker.getRegistration().then(function(reg){
        if(reg && reg.waiting){
          reg.waiting.postMessage('SKIP_WAITING');
        } else {
          window.location.reload();
        }
      });
    "><span style="font-size:16px">🔄</span> New update loading — refreshing shortly...</div>
    <div id="root"></div>
  </body>
</html>
