<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" fill="none">
  <!-- Ground shadow -->
  <ellipse cx="200" cy="165" rx="160" ry="8" fill="rgba(0,0,0,0.1)"/>
  
  <!-- Left hand/arm -->
  <rect x="52" y="128" width="14" height="38" rx="7" fill="white" opacity="0.9"/>
  <!-- Left forearm -->
  <rect x="52" y="100" width="14" height="40" rx="7" fill="white" opacity="0.9" transform="rotate(-5 59 120)"/>
  
  <!-- Right hand/arm -->
  <rect x="334" y="128" width="14" height="38" rx="7" fill="white" opacity="0.9"/>
  <!-- Right forearm -->
  <rect x="334" y="100" width="14" height="40" rx="7" fill="white" opacity="0.9" transform="rotate(5 341 120)"/>

  <!-- Body - horizontal plank -->
  <rect x="58" y="88" width="284" height="28" rx="14" fill="white" opacity="0.9"/>
  
  <!-- Hips slight raise -->
  <rect x="155" y="78" width="90" height="28" rx="14" fill="white" opacity="0.85"/>

  <!-- Head -->
  <circle cx="88" cy="68" r="26" fill="white" opacity="0.9"/>
  
  <!-- Neck -->
  <rect x="82" y="88" width="18" height="16" rx="6" fill="white" opacity="0.9"/>

  <!-- Hair suggestion -->
  <ellipse cx="88" cy="48" rx="22" ry="12" fill="white" opacity="0.6"/>

  <!-- Left leg -->
  <rect x="290" y="108" width="18" height="56" rx="9" fill="white" opacity="0.9" transform="rotate(8 299 136)"/>
  <!-- Left foot -->
  <rect x="316" y="152" width="32" height="14" rx="7" fill="white" opacity="0.85"/>

  <!-- Right leg -->
  <rect x="316" y="108" width="18" height="56" rx="9" fill="white" opacity="0.9" transform="rotate(8 325 136)"/>
  <!-- Right foot -->
  <rect x="342" y="152" width="32" height="14" rx="7" fill="white" opacity="0.85"/>

  <!-- Motion lines -->
  <line x1="30" y1="95" x2="10" y2="95" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="30" y1="108" x2="5" y2="108" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="30" y1="121" x2="14" y2="121" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
</svg>
